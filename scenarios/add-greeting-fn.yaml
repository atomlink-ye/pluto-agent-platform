name: add-greeting-fn
description: Add a greeting function in TypeScript with greeter/greetee args.
playbook: code-review-cycle
task: |-
  Implement a TypeScript function `greet(greeter: string, greetee: string): string`
  that returns "<greeter> says hi to <greetee>". Include one Vitest test.
task_mode: fixed
allow_task_override: true
overlays:
  architect:
    prompt: |-
      Spec the function shape, error cases, and the test surface in <= 8 lines.
  coder:
    prompt: |-
      Produce the function and one passing Vitest test, formatted as a single TS snippet.
  qa:
    prompt: |-
      Verify shape, output string, and test coverage. Emit PASS: or FAIL:.
