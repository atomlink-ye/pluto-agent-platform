name: architect-coder-qa
description: Architect designs, coder implements, QA reviews; max 1 revision cycle.
team_lead: lead
members: [architect, coder, qa]
workflow: |-
  As team lead:
  1. Send the task to architect; receive the spec.
  2. Hand the spec to coder; receive the artifact body.
  3. Hand the spec plus artifact to qa; receive PASS or FAIL.
  4. On QA FAIL, send concrete feedback to coder and rerun QA once.
  5. On QA PASS, write the final summary with citations of architect, coder, and qa.
audit:
  required_roles: [architect, coder, qa]
  max_revision_cycles: 1
  final_report_sections:
    - workflow_steps_executed
    - required_role_citations
    - deviations
