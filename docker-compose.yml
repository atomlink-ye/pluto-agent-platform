services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pluto
      POSTGRES_PASSWORD: pluto_dev
      POSTGRES_DB: pluto_agent_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: pluto_test
      POSTGRES_PASSWORD: pluto_test
      POSTGRES_DB: pluto_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto_test"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
