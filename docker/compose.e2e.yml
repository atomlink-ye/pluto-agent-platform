services:
  postgres-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pluto_test
      POSTGRES_PASSWORD: pluto_test
      POSTGRES_DB: pluto_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  control-plane-e2e:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      postgres-e2e:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://pluto_test:pluto_test@postgres-e2e:5432/pluto_test
      TEST_DATABASE_URL: postgres://pluto_test:pluto_test@postgres-e2e:5432/pluto_test
      CI: "true"
    volumes:
      - ..:/workspace
    command: >-
      sh -lc "
        corepack enable &&
        pnpm install --frozen-lockfile --config.confirmModulesPurge=false &&
        pnpm --filter @pluto-agent-platform/control-plane db:push &&
        pnpm exec vitest run packages/control-plane/src/__tests__/e2e-docker/lifecycle.test.ts
      "
