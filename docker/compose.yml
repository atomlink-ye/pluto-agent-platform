services:
  postgres-live:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pluto
      POSTGRES_PASSWORD: pluto_live
      POSTGRES_DB: pluto_agent_platform_live
    volumes:
      - pgdata-live:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto"]
      interval: 2s
      timeout: 5s
      retries: 10

  pluto-runtime:
    build:
      context: ..
      dockerfile: docker/pluto-runtime/Dockerfile
    working_dir: /workspace
    environment:
      PORT: 4096
      OPENCODE_PORT: 4096
    volumes:
      - ..:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20

  pluto-platform-live:
    build:
      context: ..
      dockerfile: docker/pluto-platform/Dockerfile
    working_dir: /workspace
    depends_on:
      postgres-live:
        condition: service_healthy
      pluto-runtime:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://pluto:pluto_live@postgres-live:5432/pluto_agent_platform_live
      CONTROL_PLANE_BASE_URL: http://pluto-platform-live:4000
      OPENCODE_BASE_URL: http://pluto-runtime:4096
      DEFAULT_RUN_PROVIDER: opencode
      OPENCODE_MODEL: opencode/minimax-m2.5-free
      PASEO_MODE: live
      CI: "true"
      PORT: 4000
      VITE_HOST: 0.0.0.0
      VITE_PORT: 3000
      VITE_API_PROXY_TARGET: http://localhost:4000
    ports:
      - "3000:3000"
      - "4000:4000"
    volumes:
      - ..:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 >/dev/null && curl -fsS http://localhost:4000/api/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
    command: >-
      sh -lc "
        corepack enable &&
        pnpm install --frozen-lockfile --config.confirmModulesPurge=false &&
        pnpm --filter @pluto-agent-platform/control-plane db:push &&
        trap 'kill 0' EXIT;
        pnpm --filter @pluto-agent-platform/server dev:live-server &
        pnpm --filter @pluto-agent-platform/app dev
      "

volumes:
  pgdata-live:
