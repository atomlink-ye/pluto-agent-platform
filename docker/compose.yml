# Pluto MVP-alpha Docker compose.
#
# IMPORTANT — architectural reality:
#   Paseo CLI is distributed only as a macOS app bundle today (the binary
#   on $PATH is a shell wrapper around /Applications/Paseo.app). It cannot
#   be installed inside a Linux Docker container. Therefore the live
#   PaseoOpenCodeAdapter MUST run on the host (where the Paseo daemon and
#   provider CLIs live), not inside a container.
#
#   This compose file is intentionally lean: it brings up only the OpenCode
#   web runtime (an optional debug UI / HTTP endpoint). Pluto's live smoke
#   does NOT depend on this container — `paseo run --provider opencode/...`
#   spawns the host opencode CLI, not the runtime web server. We keep the
#   container so operators can inspect OpenCode UI at http://localhost:4096
#   and so the legacy auth-mount workflow (compose.auth.local.yml) still
#   composes cleanly.
#
# Mounts:
#   - The repo is mounted at /workspace (handy if you want to run smokes
#     from a host shell that uses container paths in env vars).
#
# Secrets:
#   - .env.example uses placeholders only. Real .env is gitignored.
services:
  pluto-runtime:
    build:
      context: ..
      dockerfile: docker/pluto-runtime/Dockerfile
    image: pluto-mvp/pluto-runtime:alpha
    working_dir: /workspace
    environment:
      OPENCODE_PORT: ${OPENCODE_PORT:-4096}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-opencode/minimax-m2.5-free}
    volumes:
      - ..:/workspace
    ports:
      - "${OPENCODE_PORT:-4096}:4096"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:4096/healthz >/dev/null 2>&1 || wget -qO- http://localhost:4096/ >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
