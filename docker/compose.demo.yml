services:
  pluto-demo:
    build:
      context: ..
      dockerfile: docker/pluto-demo/Dockerfile
    working_dir: /workspace
    environment:
      CI: "true"
      PORT: 4000
      PASEO_MODE: fake
      VITE_HOST: 0.0.0.0
      VITE_PORT: 3000
    ports:
      - "3000:3000"
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 >/dev/null && curl -fsS http://localhost:4000/api/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    command: ["pnpm", "dev"]

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pluto
      POSTGRES_PASSWORD: pluto_dev
      POSTGRES_DB: pluto_agent_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: pluto_test
      POSTGRES_PASSWORD: pluto_test
      POSTGRES_DB: pluto_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto_test"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
