name: bad-missing-required-read
description: Tests fail-closed when a repo required-read points at a file that doesn't exist.
workspace:
  cwd: ${repo_root}/.tmp/four-layer/${run_id}
required_reads:
  - { kind: repo, path: docs/this-file-does-not-exist.md }
acceptance_commands: []
artifact_contract:
  required_files:
    - artifact.md
stdout_contract:
  required_lines:
    - SUMMARY:
approval_gates:
  pre_launch:
    enabled: false
secrets:
  redact: true
