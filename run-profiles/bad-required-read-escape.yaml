name: bad-required-read-escape
description: Tests path-escape rejection in required_reads.kind=repo (must fail-closed).
workspace:
  cwd: ${repo_root}/.tmp/four-layer/${run_id}
required_reads:
  - { kind: repo, path: ../../etc/passwd }
acceptance_commands: []
artifact_contract:
  required_files:
    - artifact.md
stdout_contract:
  required_lines:
    - SUMMARY:
approval_gates:
  pre_launch:
    enabled: false
secrets:
  redact: true
