name: bad-unsupported-worktree
description: Tests fail-closed (pre-side-effect) on unsupported workspace.worktree feature.
workspace:
  cwd: ${repo_root}/.tmp/four-layer/${run_id}
  worktree:
    branch: pluto/${run_id}
    path: ${repo_root}/.tmp/four-layer/wt/${run_id}
    base_ref: HEAD
required_reads:
  - { kind: repo, path: AGENTS.md }
acceptance_commands: []
artifact_contract:
  required_files:
    - artifact.md
stdout_contract:
  required_lines:
    - SUMMARY:
approval_gates:
  pre_launch:
    enabled: false
secrets:
  redact: true
